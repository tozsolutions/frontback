<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  
  <!-- Architectural Lines -->
  <g stroke="#14b8a6" stroke-width="2" opacity="0.3">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1080"/>
    <line x1="400" y1="0" x2="400" y2="1080"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
  </g>
  
  <!-- Building Silhouette -->
  <rect x="100" y="400" width="300" height="680" fill="#334155" opacity="0.5"/>
  <rect x="450" y="300" width="400" height="780" fill="#475569" opacity="0.6"/>
  <rect x="900" y="350" width="350" height="730" fill="#334155" opacity="0.5"/>
  <rect x="1300" y="250" width="500" height="830" fill="#475569" opacity="0.6"/>
  
  <!-- Sun Rays -->
  <g opacity="0.2">
    <circle cx="1600" cy="300" r="200" fill="#14b8a6"/>
    <circle cx="1600" cy="300" r="300" fill="#14b8a6" opacity="0.5"/>
    <circle cx="1600" cy="300" r="400" fill="#14b8a6" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="960" y="450" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    TOZ YAPI
  </text>
  <text x="960" y="530" font-family="Arial, sans-serif" font-size="36" fill="#14b8a6" text-anchor="middle">
    TEKNOLOJİLERİ
  </text>
  <text x="960" y="620" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">
    Güneş Kırıcı Sistemler &amp; Cephe Çözümleri
  </text>
</svg>
